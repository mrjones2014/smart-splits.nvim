id = "smart-splits.nvim"
name = "smart-splits.nvim"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Seamless Ctrl+h/j/k/l navigation across herdr panes and Vim/Neovim splits"
platforms = ["linux", "macos"]

# One action per direction. Bind them in herdr's config.toml (see README):
#
#   [[keys.command]]
#   key = "ctrl+h"
#   type = "plugin_action"
#   command = "smart-splits.nvim.left"
#
# (likewise for ctrl+j/k/l and the down/up/right actions).

[[actions]]
id = "left"
title = "Navigate left (Vim/herdr)"
contexts = ["global"]
command = ["bash", "scripts/herdr-navigate.sh", "left"]

[[actions]]
id = "down"
title = "Navigate down (Vim/herdr)"
contexts = ["global"]
command = ["bash", "scripts/herdr-navigate.sh", "down"]

[[actions]]
id = "up"
title = "Navigate up (Vim/herdr)"
contexts = ["global"]
command = ["bash", "scripts/herdr-navigate.sh", "up"]

[[actions]]
id = "right"
title = "Navigate right (Vim/herdr)"
contexts = ["global"]
command = ["bash", "scripts/herdr-navigate.sh", "right"]
